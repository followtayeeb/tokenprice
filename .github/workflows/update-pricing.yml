name: Update Pricing Data

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Update pricing data
        run: |
          # In a real implementation, this would fetch pricing from provider APIs
          # For now, we just update the timestamp
          node -e "
          const fs = require('fs');
          const path = require('path');
          const pricing = JSON.parse(fs.readFileSync('data/pricing.json', 'utf-8'));
          pricing.updated = new Date().toISOString();
          pricing.lastUpdatedBy = 'GitHub Actions';
          fs.writeFileSync('data/pricing.json', JSON.stringify(pricing, null, 2));
          console.log('Pricing updated');
          "

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/pricing.json
          git commit -m "chore: update pricing data from providers"
          git push

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update pricing data from providers'
          title: 'chore: update pricing data'
          body: |
            This PR updates the pricing data from official provider APIs.
            
            Please review and merge if pricing looks correct.
          branch: update-pricing
          delete-branch: true
