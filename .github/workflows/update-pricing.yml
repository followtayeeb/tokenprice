name: Update Pricing Data

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest prices
        run: npx tsx scripts/fetch-prices.ts --write

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/pricing.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pricing changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pricing changes detected!"
          fi

      - name: Generate PR body
        if: steps.check.outputs.changed == 'true'
        id: pr_body
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

          # Build markdown table from the diff JSON written by fetch-prices.ts
          BODY=$(node --input-type=module <<'EOF'
          import { readFile } from "fs/promises";

          const diffs = JSON.parse(await readFile(".github/pricing-diff.json", "utf-8"));

          const rows = diffs.map(d => {
            const inputChg = (((d.newInputPrice - d.oldInputPrice) / d.oldInputPrice) * 100).toFixed(1);
            const outputChg = (((d.newOutputPrice - d.oldOutputPrice) / d.oldOutputPrice) * 100).toFixed(1);
            const inputSign = parseFloat(inputChg) > 0 ? "+" : "";
            const outputSign = parseFloat(outputChg) > 0 ? "+" : "";
            return `| ${d.modelName} | ${d.provider} | $${d.oldInputPrice}/M | $${d.newInputPrice}/M | ${inputSign}${inputChg}% | $${d.oldOutputPrice}/M | $${d.newOutputPrice}/M | ${outputSign}${outputChg}% |`;
          }).join("\n");

          const table = [
            "| Model | Provider | Old Input | New Input | Input Δ | Old Output | New Output | Output Δ |",
            "|-------|----------|-----------|-----------|---------|------------|------------|----------|",
            rows
          ].join("\n");

          const body = [
            "## Pricing Update",
            "",
            "This PR was automatically generated by the weekly pricing update workflow.",
            "Please review the changes below and merge if they look correct.",
            "",
            "### Changes",
            "",
            table,
            "",
            "### Sources",
            "",
            "Prices sourced from the [LiteLLM model prices database](https://github.com/BerriAI/litellm/blob/main/model_prices_and_context_window.json).",
            "Provider reference pages are listed in `data/pricing.json` under `sources`.",
          ].join("\n");

          process.stdout.write(body);
          EOF
          )

          # Write body to a file to avoid shell escaping issues
          echo "$BODY" > /tmp/pr_body.md
          echo "body_file=/tmp/pr_body.md" >> "$GITHUB_OUTPUT"

      - name: Commit updated pricing
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/pricing.json
          git commit -m "chore: pricing update ${{ steps.pr_body.outputs.date }}"

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: pricing update ${{ steps.pr_body.outputs.date }}"
          title: "chore: pricing update ${{ steps.pr_body.outputs.date }}"
          body-path: /tmp/pr_body.md
          branch: "chore/pricing-update-${{ steps.pr_body.outputs.date }}"
          delete-branch: true
          labels: "pricing,automated"
